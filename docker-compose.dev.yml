# Dev overlay — SLA-1 laptop testing (Windows/macOS/Linux)
# Overrides host networking so Signal K and bridge run on the compose network.
#
# Usage (from repo root):
#   copy deploy\env\dev.env.example deploy\env\dev.env
#   docker compose -f docker-compose.sla-1.yml -f docker-compose.dev.yml --env-file deploy/env/dev.env up -d --build

name: ai-sailing-dev

services:
  signalk-server:
    network_mode: bridge
    ports:
      - "${SIGNALK_PORT:-3000}:3000"
    volumes:
      - signalk-config:/home/node/.signalk
      - ./config/signalk:/signalk-settings:ro

  signalk-influx-bridge:
    network_mode: bridge
    depends_on:
      signalk-server:
        condition: service_started
      influxdb:
        condition: service_healthy
    environment:
      SIGNALK_WS_URL: ws://signalk-server:3000/signalk/v1/stream?subscribe=all
      INFLUX_URL: http://influxdb:8086

  influxdb:
    ports:
      - "${INFLUX_PORT:-8086}:8086"

  grafana-telemetry:
    ports:
      - "${GRAFANA_TELEMETRY_PORT:-3001}:3000"
