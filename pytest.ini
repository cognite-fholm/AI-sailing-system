[pytest]
testpaths = tests/bdd/steps tests/unit
pythonpath = .
bdd_features_base_dir = tests/bdd/features

markers =
    phase_00: Phase 0 foundation acceptance tests
    phase_01: Phase 1 SLA-1 telemetry
    phase_02a: Phase 2A shore race prep
    phase_02b: Phase 2B graph import
    phase_02c: Phase 2C GRIB polars AIS
    phase_02d: Phase 2D courses and results
    phase_02e: Phase 2E race UX
    phase_02f: Phase 2F analytics and alerts
    phase_02g: Phase 2G race laptop MCP
    phase_03: Phase 3 SLA-3 vision
    phase_04: Phase 4 CI/CD
    phase_05: Phase 5 shore training
    wip: Pending implementation — skipped unless --run-wip

filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
