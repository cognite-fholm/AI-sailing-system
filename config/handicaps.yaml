# Handicap ratings — multiple per vessel (ORC certificate format)
# Reference: ../ORC Certificate for Off Course.pdf

scoring_rules:
  # Færderseilasen 2026 §23 — Racing: corrected = elapsed × handicap
  default_method: time_on_time
  default_rating: scoring_aph
  triple_number:
    enabled: false
    tws_light_max: 8
    tws_heavy_min: 14

