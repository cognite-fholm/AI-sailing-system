# AI-sailing-data repository connection
# Clone target on Pi: /opt/ai-sailing-data

data_repo:
  url: https://github.com/cognite-fholm/AI-sailing-data.git
  local_path: /opt/ai-sailing-data
  branch: main
  tag: null

sync:
  poll_interval_minutes: 60
  auto_pull: true
  auto_import_neo4j: false
  online_required: true

# race-lifecycle reads spec.schedule from active race.yaml (ADR-0026)
lifecycle:
  enabled: true
  poll_seconds: 60
  state_file: /var/run/ai-sailing/race-lifecycle.json

active:
  regatta_id: faerderseilasen-2026
  race_path: races/2026/2026-06-faerderseilasen
  own_boat_path: boats/NOR-10133
  active_certificate_ref: cert-international-034400038T6
  certificate_year: 2024
  index_file: index.yaml

live_sync:
  enabled: true
  interval_minutes: 5
  branch_pattern: "race-live/{regatta_id}"
  online_required: true
  git_user_name: race-live-sync
  git_user_email: race-live-sync@boats.local

neo4j:
  uri: bolt://neo4j:7687
  user: neo4j
  password: change-me-neo4j

influx:
  url: http://influxdb:8086
  org: ai-sailing
  bucket: race
