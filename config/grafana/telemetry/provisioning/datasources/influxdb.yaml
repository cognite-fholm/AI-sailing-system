apiVersion: 1

datasources:
  - name: InfluxDB-signalk
    type: influxdb
    access: proxy
    uid: influx-signalk
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: ${INFLUX_ORG}
      defaultBucket: ${INFLUX_BUCKET}
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUX_TOKEN}
