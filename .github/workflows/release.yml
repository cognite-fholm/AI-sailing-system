# On version tag: build all tiers (when Dockerfiles exist) and write deploy lock stub
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write lock file stub
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LOCK="deploy/locks/${VERSION}.env"
          mkdir -p deploy/locks
          cat > "$LOCK" <<EOF
          # Generated by release.yml — replace digests when images are published
          RELEASE_VERSION=${VERSION}
          RELEASE_SHA=${GITHUB_SHA}
          RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # POLAR_MANAGER_IMAGE=ghcr.io/${{ github.repository_owner }}/polar-manager@${{ github.sha }}
          EOF
          echo "Wrote $LOCK"

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: deploy/locks/${{ github.ref_name }}.env
