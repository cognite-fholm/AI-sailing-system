# Build and push SLA-1 arm64 images to GHCR
name: Publish SLA-1 images

on:
  push:
    branches: [main]
    paths:
      - 'signalk-influx-bridge/**'
      - 'signalk-server/**'
      - 'course-sk-sync/**'
      - 'signalk-polar-performance/**'
      - 'config/signalk/**'
      - 'config/grafana/telemetry/**'
      - 'docker-compose.sla-1.yml'
      - '.github/workflows/publish-sla-1.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: signalk-server
            context: signalk-server
            dockerfile: signalk-server/Dockerfile
          - service: signalk-influx-bridge
            context: signalk-influx-bridge
            dockerfile: signalk-influx-bridge/Dockerfile
          - service: course-sk-sync
            context: course-sk-sync
            dockerfile: course-sk-sync/Dockerfile
          - service: signalk-polar-performance
            context: signalk-polar-performance
            dockerfile: signalk-polar-performance/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
