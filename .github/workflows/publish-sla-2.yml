# Build and push SLA-2 arm64 images to GHCR
# Extend SERVICE_MATRIX when Dockerfiles exist under each service directory
name: Publish SLA-2 images

on:
  push:
    branches: [main]
    paths:
      - 'tactical-coach/**'
      - 'course-parser/**'
      - 'polar-manager/**'
      - 'live-results/**'
      - 'fleet-performance-tracker/**'
      - 'ais-collector/**'
      - 'grib-model-scorer/**'
      - 'race-live-sync/**'
      - 'race-lifecycle/**'
      - 'course-editor/**'
      - 'race-import/**'
      - 'race-data-sync/**'
      - 'race-mcp-gateway/**'
      - 'docker-compose.sla-2.yml'
      - '.github/workflows/publish-sla-2.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: polar-manager
            context: polar-manager
            dockerfile: polar-manager/Dockerfile
          - service: race-import
            context: race-import
            dockerfile: race-import/Dockerfile
          - service: race-data-sync
            context: race-data-sync
            dockerfile: race-data-sync/Dockerfile
          - service: race-mcp-gateway
            context: race-mcp-gateway
            dockerfile: race-mcp-gateway/Dockerfile
          - service: race-live-sync
            context: .
            dockerfile: race-live-sync/Dockerfile
          - service: fleet-performance-tracker
            context: .
            dockerfile: fleet-performance-tracker/Dockerfile
          - service: ais-collector
            context: .
            dockerfile: ais-collector/Dockerfile
          - service: grib-model-scorer
            context: .
            dockerfile: grib-model-scorer/Dockerfile
          - service: race-lifecycle
            context: .
            dockerfile: race-lifecycle/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skip ${{ matrix.service }} — Dockerfile not yet added (Phase 2+)"
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.check.outputs.exists == 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'true'

      - uses: docker/login-action@v3
        if: steps.check.outputs.exists == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists == 'true'
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
