# Lint and test on pull requests and main
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout AI-sailing-data
        id: data
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cognite-fholm/AI-sailing-data
          path: AI-sailing-data
          # Required for private sibling repo. Fine-grained PAT: contents read on AI-sailing-data.
          # Repo secret: AI_SAILING_DATA_CHECKOUT_TOKEN (see deploy/README.md).
          token: ${{ secrets.AI_SAILING_DATA_CHECKOUT_TOKEN }}

      - name: Note data-repo checkout
        if: steps.data.outcome != 'success'
        run: |
          echo "::warning::AI-sailing-data checkout skipped — add repo secret AI_SAILING_DATA_CHECKOUT_TOKEN for full cross-repo validation."
          echo "YAML-LD/SHACL still runs in AI-sailing-data CI."

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, pathlib, sys
          for p in pathlib.Path('config').glob('*.yaml'):
              yaml.safe_load(p.read_text(encoding='utf-8'))
              print('OK', p)
          "

      - name: Prepare compose secret stub
        run: |
          mkdir -p deploy/secrets
          echo "ci-placeholder-not-a-real-token" > deploy/secrets/github_token

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose.sla-1.yml config --quiet
          docker compose -f docker-compose.sla-2.yml config --quiet
          docker compose -f docker-compose.harbor.yml config --quiet
          docker compose -f docker-compose.sla-1.yml -f docker-compose.dev.yml config --quiet
          docker compose -f docker-compose.sla-2.yml -f docker-compose.dev-sla2.yml config --quiet

      - name: Run acceptance and unit tests
        env:
          AI_SAILING_DATA_ROOT: ${{ steps.data.outcome == 'success' && format('{0}/AI-sailing-data', github.workspace) }}
        run: |
          pip install -r requirements-dev.txt
          pytest tests/bdd/steps tests/unit -m "not wip" -q --cov=course_sk_sync --cov=polar_manager --cov=signalk_influx_bridge --cov=signalk_polar_performance --cov-report=term-missing --cov-fail-under=45

      - name: Validate AI-sailing-data YAML-LD and SHACL
        if: steps.data.outcome == 'success'
        run: |
          pip install -r AI-sailing-data/requirements-dev.txt
          python AI-sailing-data/scripts/sync_hosted_context.py
          python AI-sailing-data/scripts/validate_yaml_ld.py

      - name: Check ADR index
        run: test -f adr/README.md

      # Placeholder — extend when service code lands:
      # - ruff check (Python services)
      # - npm test (course-editor)
